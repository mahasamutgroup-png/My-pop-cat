<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Orange Cat Pop! - World Score</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@700;900&display=swap');
        
        body {
            font-family: 'Kanit', sans-serif;
            background-color: #2b2316;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
        }

        .score-number {
            font-size: 8rem;
            font-weight: 900;
            color: #f38241;
            line-height: 0.8;
            margin-bottom: 5px;
            text-shadow: 4px 4px 0px #fff;
            letter-spacing: -2px;
        }

        .total-pops-label {
            font-size: 1.5rem;
            font-weight: 700;
            color: #f38241;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 2rem;
        }

        .cat-frame {
            background-color: #ffffff;
            padding: 25px;
            border-radius: 60px;
            width: 85%;
            max-width: 450px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: transform 0.05s ease;
        }

        .cat-image {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: 40px;
            display: block;
        }

        #cat-open { display: none; }

        .is-pressing .cat-frame { transform: scale(0.96); }
        .is-pressing #cat-closed { display: none; }
        .is-pressing #cat-open { display: block; }

        .pop-text {
            position: absolute;
            font-size: 3rem;
            font-weight: 900;
            color: #ffffff;
            pointer-events: none;
            z-index: 100;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
            animation: floatUp 0.4s ease-out forwards;
        }

        @keyframes floatUp {
            0% { transform: translate(-50%, 0) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -120px) scale(1.6); opacity: 0; }
        }

        .status-tag {
            position: absolute;
            bottom: 20px;
            color: #f38241;
            font-size: 0.8rem;
            opacity: 0.8;
            background: rgba(255, 255, 255, 0.1);
            padding: 4px 12px;
            border-radius: 20px;
        }
    </style>
</head>
<body>

    <div class="score-number" id="score">0</div>
    <div class="total-pops-label">WORLD WIDE POPS</div>

    <div class="cat-frame" id="game-btn">
        <img src="https://i.ibb.co/nN34kBWy/image.jpg" id="cat-closed" class="cat-image" alt="Cat Closed">
        <img src="https://i.ibb.co/GfJ290Hr/image.jpg" id="cat-open" class="cat-image" alt="Cat Open">
    </div>

    <div class="status-tag" id="status">Syncing World Score...</div>
    <!-- เตือนความจำพิเศษสำหรับคุณ -->
    <div style="position:fixed; bottom:5px; color:#4a3f2d; font-size:10px;">🚗 Reminder: ชั้น B</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, doc, setDoc, increment, onSnapshot } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'global-popcat';

        let user = null;
        const scoreEl = document.getElementById('score');
        const gameBtn = document.getElementById('game-btn');
        const statusEl = document.getElementById('status');

        // Audio System
        let audioCtx = null;
        function playPopSound() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(500, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1100, audioCtx.currentTime + 0.05);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        function createPopText(x, y) {
            const el = document.createElement('div');
            el.className = 'pop-text';
            el.innerText = 'POP!';
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 400);
        }

        // บันทึกคะแนนลงใน Public Data (Rule 1: public/data/...)
        async function syncGlobalScore() {
            if (!user) return;
            const globalScoreDoc = doc(db, 'artifacts', appId, 'public', 'data', 'world_score');
            try {
                // เพิ่มคะแนน 1 แต้มในฐานข้อมูลกลาง
                await setDoc(globalScoreDoc, { total: increment(1) }, { merge: true });
            } catch (e) { 
                console.error("Sync Error", e); 
            }
        }

        function handlePress(e) {
            if (e.cancelable) e.preventDefault();
            document.body.classList.add('is-pressing');
            playPopSound();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            createPopText(clientX, clientY);

            // ส่งคะแนนไปสะสมรวมกับคนอื่น
            syncGlobalScore();
        }

        function handleRelease(e) {
            if (e.cancelable) e.preventDefault();
            document.body.classList.remove('is-pressing');
        }

        // ล็อกอินและดึงคะแนนรวมของโลก
        const initGame = async () => {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        };

        initGame();

        onAuthStateChanged(auth, (u) => {
            user = u;
            if (user) {
                statusEl.innerText = "Connected to World Server";
                
                // ดึงคะแนนรวมของทุกคนมาแสดง (Public Data)
                const globalScoreDoc = doc(db, 'artifacts', appId, 'public', 'data', 'world_score');
                onSnapshot(globalScoreDoc, (docSnap) => {
                    if (docSnap.exists()) {
                        scoreEl.innerText = docSnap.data().total.toLocaleString();
                    }
                }, (err) => { 
                    statusEl.innerText = "Reconnecting...";
                });
            }
        });

        gameBtn.addEventListener('mousedown', handlePress);
        window.addEventListener('mouseup', handleRelease);
        gameBtn.addEventListener('touchstart', handlePress, { passive: false });
        window.addEventListener('touchend', handleRelease, { passive: false });
        window.ondragstart = function() { return false; }
    </script>
</body>
</html>

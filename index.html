```html
<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Orange Cat Pop!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@700;900&display=swap');
        
        body {
            font-family: 'Kanit', sans-serif;
            background-color: #2b2316;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
        }

        .score-number {
            font-size: 8rem;
            font-weight: 900;
            color: #f38241;
            line-height: 0.8;
            margin-bottom: 5px;
            text-shadow: 4px 4px 0px #fff;
            letter-spacing: -2px;
        }

        .total-pops-label {
            font-size: 1.5rem;
            font-weight: 700;
            color: #f38241;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 2rem;
        }

        .cat-frame {
            background-color: #ffffff;
            padding: 25px;
            border-radius: 60px;
            width: 85%;
            max-width: 450px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: transform 0.05s ease;
        }

        .cat-image {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: 40px;
            display: block;
        }

        #cat-open { display: none; }

        .is-pressing .cat-frame { transform: scale(0.96); }
        .is-pressing #cat-closed { display: none; }
        .is-pressing #cat-open { display: block; }

        .pop-text {
            position: absolute;
            font-size: 3rem;
            font-weight: 900;
            color: #ffffff;
            pointer-events: none;
            z-index: 100;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
            animation: floatUp 0.4s ease-out forwards;
        }

        @keyframes floatUp {
            0% { transform: translate(-50%, 0) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -120px) scale(1.6); opacity: 0; }
        }

        .reset-btn {
            margin-top: 2rem;
            color: #6b5a3e;
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            opacity: 0.6;
            background: transparent;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="score-number" id="score">0</div>
    <div class="total-pops-label">TOTAL POPS</div>

    <div class="cat-frame" id="game-btn">
        <img src="https://i.ibb.co/VWzqcV6G/image.jpg" id="cat-closed" class="cat-image" alt="Cat Closed">
        <img src="https://i.ibb.co/DfnfnQMP/image.jpg" id="cat-open" class="cat-image" alt="Cat Open">
    </div>

    <button onclick="resetScore()" class="reset-btn">Reset Score</button>

    <script>
        let count = 0;
        const scoreEl = document.getElementById('score');
        const gameBtn = document.getElementById('game-btn');
        
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playPopSound() {
            initAudio();
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            // ใช้ Oscillator แบบสั้นๆ เพื่อให้กดรัวได้โดยเสียงไม่สะสมจนหาย
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(500, audioCtx.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(1100, audioCtx.currentTime + 0.05);

            gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.1);
        }

        function createPopText(x, y) {
            const el = document.createElement('div');
            el.className = 'pop-text';
            el.innerText = 'POP!';
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 400);
        }

        function handlePress(e) {
            if (e.cancelable) e.preventDefault();
            
            document.body.classList.add('is-pressing');
            count++;
            scoreEl.innerText = count;
            
            playPopSound();
            
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            createPopText(clientX, clientY);
        }

        function handleRelease(e) {
            if (e.cancelable) e.preventDefault();
            document.body.classList.remove('is-pressing');
        }

        function resetScore() {
            count = 0;
            scoreEl.innerText = count;
        }

        gameBtn.addEventListener('mousedown', handlePress);
        window.addEventListener('mouseup', handleRelease);
        gameBtn.addEventListener('touchstart', handlePress, { passive: false });
        window.addEventListener('touchend', handleRelease, { passive: false });
        window.ondragstart = function() { return false; }
    </script>
</body>
</html>

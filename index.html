<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Orange Cat Pop! - Persistent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@700;900&display=swap');
        
        body {
            font-family: 'Kanit', sans-serif;
            background-color: #2b2316;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
        }

        .score-number {
            font-size: 8rem;
            font-weight: 900;
            color: #f38241;
            line-height: 0.8;
            margin-bottom: 5px;
            text-shadow: 4px 4px 0px #fff;
            letter-spacing: -2px;
        }

        .total-pops-label {
            font-size: 1.5rem;
            font-weight: 700;
            color: #f38241;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 2rem;
        }

        .cat-frame {
            background-color: #ffffff;
            padding: 25px;
            border-radius: 60px;
            width: 85%;
            max-width: 450px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: transform 0.05s ease;
        }

        .cat-image {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: 40px;
            display: block;
        }

        #cat-open { display: none; }

        .is-pressing .cat-frame { transform: scale(0.96); }
        .is-pressing #cat-closed { display: none; }
        .is-pressing #cat-open { display: block; }

        .pop-text {
            position: absolute;
            font-size: 3rem;
            font-weight: 900;
            color: #ffffff;
            pointer-events: none;
            z-index: 100;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
            animation: floatUp 0.4s ease-out forwards;
        }

        @keyframes floatUp {
            0% { transform: translate(-50%, 0) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -120px) scale(1.6); opacity: 0; }
        }

        .reset-btn {
            margin-top: 2rem;
            color: #6b5a3e;
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            opacity: 0.6;
            background: transparent;
            border: none;
            cursor: pointer;
        }

        .status-tag {
            position: absolute;
            bottom: 20px;
            color: #f38241;
            font-size: 0.8rem;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div class="score-number" id="score">0</div>
    <div class="total-pops-label">TOTAL POPS</div>

    <div class="cat-frame" id="game-btn">
        <!-- รูปปกติที่อัปเดตใหม่ -->
        <img src="https://i.ibb.co/nN34kBWy/image.jpg" id="cat-closed" class="cat-image" alt="Cat Closed">
        <!-- รูปตอนกดที่อัปเดตใหม่ -->
        <img src="https://i.ibb.co/GfJ290Hr/image.jpg" id="cat-open" class="cat-image" alt="Cat Open">
    </div>

    <button onclick="handleReset()" class="reset-btn">Reset Score</button>
    <div class="status-tag" id="status">Syncing...</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, increment, onSnapshot } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

        // Firebase Configuration (Provided by environment)
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'popcat-game';

        let count = 0;
        let user = null;
        const scoreEl = document.getElementById('score');
        const gameBtn = document.getElementById('game-btn');
        const statusEl = document.getElementById('status');

        // Initialize Audio once
        let audioCtx = null;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        // Play Sound
        function playPopSound() {
            initAudio();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(500, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1100, audioCtx.currentTime + 0.05);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        // Create Pop Text Effect
        function createPopText(x, y) {
            const el = document.createElement('div');
            el.className = 'pop-text';
            el.innerText = 'POP!';
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 400);
        }

        // Firestore Logic (Rule 1 & 3 compliant)
        async function syncScore(isReset = false) {
            if (!user) return;
            const scoreDoc = doc(db, 'artifacts', appId, 'users', user.uid, 'gameData', 'score');
            
            if (isReset) {
                await setDoc(scoreDoc, { count: 0 });
            } else {
                await setDoc(scoreDoc, { count: increment(1) }, { merge: true });
            }
        }

        // Handle Click/Touch
        async function handlePress(e) {
            if (e.cancelable) e.preventDefault();
            document.body.classList.add('is-pressing');
            
            playPopSound();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            createPopText(clientX, clientY);

            // บันทึกลง Cloud ทันที
            if (user) {
                syncScore();
            }
        }

        function handleRelease(e) {
            if (e.cancelable) e.preventDefault();
            document.body.classList.remove('is-pressing');
        }

        window.handleReset = async () => {
            if (confirm("ต้องการรีเซ็ตคะแนนทั้งหมดใช่หรือไม่?")) {
                await syncScore(true);
            }
        };

        // Auth & Initial Load
        onAuthStateChanged(auth, (u) => {
            user = u;
            if (user) {
                statusEl.innerText = "Connected: " + user.uid.substring(0, 8);
                // Listen to score changes in real-time
                const scoreDoc = doc(db, 'artifacts', appId, 'users', user.uid, 'gameData', 'score');
                onSnapshot(scoreDoc, (docSnap) => {
                    if (docSnap.exists()) {
                        count = docSnap.data().count;
                        scoreEl.innerText = count;
                    } else {
                        scoreEl.innerText = 0;
                    }
                }, (error) => {
                    console.error("Firestore error:", error);
                    statusEl.innerText = "Connection Error";
                });
            } else {
                signInAnonymously(auth).catch(err => {
                    statusEl.innerText = "Offline Mode";
                });
            }
        });

        // Event Listeners
        gameBtn.addEventListener('mousedown', handlePress);
        window.addEventListener('mouseup', handleRelease);
        gameBtn.addEventListener('touchstart', handlePress, { passive: false });
        window.addEventListener('touchend', handleRelease, { passive: false });
        window.ondragstart = function() { return false; }
    </script>
</body>
</html>
